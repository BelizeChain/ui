name: Blue Hole Portal CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'blue-hole-portal/**'
      - 'shared/**'
      - 'Dockerfile'
      - 'package.json'
      - '.github/workflows/blue-hole-portal.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'blue-hole-portal/**'
      - 'shared/**'
      - 'Dockerfile'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  NEXT_PUBLIC_BLOCKCHAIN_WS: 'ws://127.0.0.1:9944'
  NEXT_PUBLIC_BLOCKCHAIN_RPC: 'http://127.0.0.1:9933'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Lint Blue Hole Portal
        continue-on-error: true
        run: npm run lint --workspace=blue-hole-portal

      - name: Type check Blue Hole Portal
        continue-on-error: true
        run: npm run type-check --workspace=blue-hole-portal

  build:
    name: Build Blue Hole Portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npm run build --workspace=shared

      - name: Build Blue Hole Portal
        continue-on-error: true
        run: npm run build --workspace=blue-hole-portal
        env:
          NEXT_PUBLIC_DEV_MODE: 'false'

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh blue-hole-portal/.next/standalone | awk '{print $1}')
          echo "📦 Bundle size: $BUNDLE_SIZE"
          echo "bundle_size=$BUNDLE_SIZE" >> $GITHUB_OUTPUT
        id: bundle

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blue-hole-portal-build
          path: |
            blue-hole-portal/.next
            blue-hole-portal/public
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        continue-on-error: true
        run: npm run test --workspace=blue-hole-portal
        env:
          CI: true

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./blue-hole-portal/coverage/lcov.info
          flags: blue-hole-portal
          name: blue-hole-portal
          fail_ci_if_error: false

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=blue-hole-portal

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: blue-hole-portal/storybook-static
          retention-days: 7

  ceiba-handoff:
    name: Ceiba Handoff Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint-and-typecheck, build, test]
    steps:
      - name: Summarize Ceiba handoff
        run: |
          echo "# Blue Hole Portal Ceiba handoff" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- This repo does not self-deploy preview environments." >> $GITHUB_STEP_SUMMARY
          echo "- Active rollout target is the Ceiba self-hosted stack managed in BelizeChain/infra." >> $GITHUB_STEP_SUMMARY
          echo "- Docker build target: portal with APP_NAME=blue-hole-portal." >> $GITHUB_STEP_SUMMARY
          echo "- Expected public reverse-proxy routes: /rpc, /ws, /api/pakit, /api/nawal, /api/kinich, /ipfs." >> $GITHUB_STEP_SUMMARY

  build-ceiba-image:
    name: Build Ceiba Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-typecheck, build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Blue Hole Portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_NAME=blue-hole-portal
            NEXT_PUBLIC_BLOCKCHAIN_WS=wss://belizechain.org/ws
            NEXT_PUBLIC_BLOCKCHAIN_RPC=https://belizechain.org/rpc
            NEXT_PUBLIC_IPFS_GATEWAY=https://belizechain.org/ipfs
            NEXT_PUBLIC_KINICH_API=https://belizechain.org/api/kinich
            NEXT_PUBLIC_PAKIT_API=https://belizechain.org/api/pakit
            NEXT_PUBLIC_NAWAL_API=https://belizechain.org/api/nawal
            NEXT_PUBLIC_NETWORK_NAME=BelizeChain Testnet
            NEXT_PUBLIC_DALLA_CONTRACT=r1SAvDb2f5iFbafWL87rE1jP6QV3qCV5xtK8b1QXuqKpGknj5
            NEXT_PUBLIC_BELI_NFT_CONTRACT=r1Wywor1ittVCyZeYaA9hweBwuDiXLC2UdLNQm4oUB1ub8qyN
            NEXT_PUBLIC_DAO_CONTRACT=r1VnpeWtfLmtZ2W2UJhYXSLoHhwo7tAY48RZyVirRu5ucLi7i
            NEXT_PUBLIC_FAUCET_CONTRACT=r1TDXUdxgeLC5BAkFQeZnZNSAX67FwRAaavmG19TzPtc2Szcg
          target: portal
          push: false
          load: false
          tags: belizechain/blue-hole-portal:${{ github.sha }}

      - name: Summarize image handoff
        run: |
          echo "# Blue Hole Portal image build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Built image tag: belizechain/blue-hole-portal:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- No registry push occurs in this repo." >> $GITHUB_STEP_SUMMARY
          echo "- Promote by pinning an immutable tag in BelizeChain/infra before rollout on Ceiba." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test, ceiba-handoff, build-ceiba-image]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "# 🏛️ Blue Hole Portal CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ceiba Handoff | ${{ needs.ceiba-handoff.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ceiba Image Build | ${{ needs.build-ceiba-image.result }} |" >> $GITHUB_STEP_SUMMARY
