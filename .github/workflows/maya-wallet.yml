name: Maya Wallet CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'maya-wallet/**'
      - 'shared/**'
      - 'package.json'
      - '.github/workflows/maya-wallet.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'maya-wallet/**'
      - 'shared/**'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  NEXT_PUBLIC_BLOCKCHAIN_WS: 'ws://127.0.0.1:9944'
  NEXT_PUBLIC_BLOCKCHAIN_RPC: 'http://127.0.0.1:9933'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Lint Maya Wallet
        continue-on-error: true
        run: npm run lint --workspace=maya-wallet

      - name: Type check Maya Wallet
        continue-on-error: true
        run: npm run type-check --workspace=maya-wallet

  build:
    name: Build Maya Wallet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npm run build --workspace=shared

      - name: Build Maya Wallet
        continue-on-error: true
        run: npm run build --workspace=maya-wallet
        env:
          NEXT_PUBLIC_DEV_MODE: 'false'

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh maya-wallet/.next/standalone | awk '{print $1}')
          echo "📦 Bundle size: $BUNDLE_SIZE"
          echo "bundle_size=$BUNDLE_SIZE" >> $GITHUB_OUTPUT
        id: bundle

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maya-wallet-build
          path: |
            maya-wallet/.next
            maya-wallet/public
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: maya-wallet-build
          path: maya-wallet/

      - name: Run Playwright tests
        continue-on-error: true
        run: npm run test --workspace=maya-wallet
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: maya-wallet/test-results/
          retention-days: 30

  ceiba-handoff:
    name: Ceiba Handoff Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint-and-typecheck, build, test]
    steps:
      - name: Summarize Ceiba handoff
        run: |
          echo "# Maya Wallet Ceiba handoff" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- This repo does not self-deploy preview environments." >> $GITHUB_STEP_SUMMARY
          echo "- Active rollout target is the Ceiba self-hosted stack managed in BelizeChain/infra." >> $GITHUB_STEP_SUMMARY
          echo "- Docker build target: wallet with APP_NAME=maya-wallet." >> $GITHUB_STEP_SUMMARY
          echo "- Expected public reverse-proxy routes: /rpc, /ws, /api/pakit, /api/nawal, /api/kinich, /ipfs." >> $GITHUB_STEP_SUMMARY

  build-ceiba-image:
    name: Build Ceiba Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-typecheck, build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Maya Wallet image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_NAME=maya-wallet
          target: wallet
          push: false
          load: false
          tags: belizechain/maya-wallet:${{ github.sha }}

      - name: Summarize image handoff
        run: |
          echo "# Maya Wallet image build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Built image tag: belizechain/maya-wallet:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- No registry push occurs in this repo." >> $GITHUB_STEP_SUMMARY
          echo "- Promote by pinning an immutable tag in BelizeChain/infra before rollout on Ceiba." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test, ceiba-handoff, build-ceiba-image]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "# 📱 Maya Wallet CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ceiba Handoff | ${{ needs.ceiba-handoff.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ceiba Image Build | ${{ needs.build-ceiba-image.result }} |" >> $GITHUB_STEP_SUMMARY
