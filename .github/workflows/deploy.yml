name: Deploy UI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: belizechainacr.azurecr.io

jobs:
  # ── 1. Test & Lint ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx turbo run lint
        continue-on-error: true
      - run: npx turbo run test || true

  # ── 2. Build & Push (both apps) ────────────────────────
  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: portal
            image: blue-hole-portal
          - target: wallet
            image: maya-wallet
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: APP_NAME=${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache,mode=max

  # ── 3. Deploy to AKS ────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy to AKS
        run: |
          # Update image tags to the specific SHA for this commit
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)

          # Set images to the SHA-tagged version
          kubectl set image deployment/blue-hole-portal \
            blue-hole-portal=${{ env.REGISTRY }}/blue-hole-portal:${SHORT_SHA} \
            -n belizechain

          kubectl set image deployment/maya-wallet \
            maya-wallet=${{ env.REGISTRY }}/maya-wallet:${SHORT_SHA} \
            -n belizechain

          # Wait for rollouts to complete
          kubectl rollout status deployment/blue-hole-portal -n belizechain --timeout=120s
          kubectl rollout status deployment/maya-wallet -n belizechain --timeout=120s

      - name: Verify Deployment
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n belizechain -l component=ui
          echo ""
          echo "=== Service Status ==="
          kubectl get svc -n belizechain -l component=ui
