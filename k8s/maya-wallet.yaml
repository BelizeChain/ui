apiVersion: apps/v1
kind: Deployment
metadata:
  name: maya-wallet
  namespace: belizechain
  labels:
    app: maya-wallet
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maya-wallet
  template:
    metadata:
      labels:
        app: maya-wallet
        component: ui
    spec:
      containers:
        - name: maya-wallet
          image: belizechainacr.azurecr.io/maya-wallet:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_BLOCKCHAIN_WS
              value: ws://belizechain-node.belizechain.svc.cluster.local:9944
            - name: NEXT_PUBLIC_PAKIT_API
              value: http://pakit-storage.belizechain.svc.cluster.local:8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: maya-wallet
  namespace: belizechain
  labels:
    app: maya-wallet
    component: ui
spec:
  type: ClusterIP
  selector:
    app: maya-wallet
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
