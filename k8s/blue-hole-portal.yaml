apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-hole-portal
  namespace: belizechain
  labels:
    app: blue-hole-portal
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-hole-portal
  template:
    metadata:
      labels:
        app: blue-hole-portal
        component: ui
    spec:
      containers:
        - name: blue-hole-portal
          image: belizechainacr.azurecr.io/blue-hole-portal:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_BLOCKCHAIN_WS
              value: ws://belizechain-node.belizechain.svc.cluster.local:9944
            - name: NEXT_PUBLIC_KINICH_API
              value: http://kinich-quantum.belizechain.svc.cluster.local:8888
            - name: NEXT_PUBLIC_NAWAL_API
              value: http://nawal-ai.belizechain.svc.cluster.local:8080
            - name: NEXT_PUBLIC_PAKIT_API
              value: http://pakit-storage.belizechain.svc.cluster.local:8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: blue-hole-portal
  namespace: belizechain
  labels:
    app: blue-hole-portal
    component: ui
spec:
  type: ClusterIP
  selector:
    app: blue-hole-portal
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
